name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run build:github-pages

      - name: SPA fallback for GitHub Pages
        run: cp dist/app/browser/index.html dist/app/browser/404.html

      - name: Disable Jekyll (serve Angular assets as-is)
        run: touch dist/app/browser/.nojekyll

      - name: Push built site to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/app/browser
          force_orphan: true
