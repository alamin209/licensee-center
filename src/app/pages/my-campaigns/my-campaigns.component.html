<div class="app-page">
  <div class="page-header">
    <h1>Campaigns</h1>
  </div>
  
  <mat-card class="form-card app-outlined-form my-campaigns-card" appearance="outlined">
    <mat-card-header class="custom-card-header">
      <mat-card-title>My Campaigns</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <div class="app-data-table-toolbar">
        <mat-radio-group [(ngModel)]="listFilter" name="myCampaignListFilter" class="app-data-table-toolbar__radios">
          <mat-radio-button value="all" color="primary">All</mat-radio-button>
          <mat-radio-button value="live" color="primary">Live</mat-radio-button>
          <mat-radio-button value="draft" color="primary">Draft</mat-radio-button>
        </mat-radio-group>
      </div>

      <div class="app-data-table-scroll">
        <table class="app-data-table">
          <thead>
            <tr>
              <th scope="col">ID</th>
              <th scope="col">Name</th>
              <th scope="col">Type</th>
              <th scope="col">No.</th>
              <th scope="col">Initiate</th>
              <th scope="col">% Data</th>
              <th scope="col">No. Done</th>
              <th scope="col">Lead</th>
              <th scope="col" class="app-data-table__col--actions" aria-label="Actions"></th>
            </tr>
          </thead>
          <tbody>
            @for (row of campaigns; track row.id) {
              <tr>
                <td>{{ row.id }}</td>
                <td>{{ row.name }}</td>
                <td>{{ row.type }}</td>
                <td>{{ row.count }}</td>
                <td>{{ row.initiate }}</td>
                <td>{{ row.live }}</td> <!-- Assuming this maps to % Data -->
                <td>{{ row.logOnPct }}</td> <!-- Assuming this maps to No. Done -->
                <td>{{ row.lead }}</td>
                <td class="app-data-table__col--actions">
                  <button
                    mat-icon-button
                    type="button"
                    class="app-data-table__icon-btn"
                    [attr.aria-label]="'Edit campaign ' + row.name"
                    (click)="openEdit(row)"
                  >
                    <mat-icon>visibility</mat-icon>
                  </button>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </mat-card-content>
  </mat-card>
</div>
